name: resource-hunter-ci

on:
  push:
    paths:
      - "skills/resource-hunter/**"
      - ".github/workflows/resource-hunter-ci.yml"
  pull_request:
    paths:
      - "skills/resource-hunter/**"
      - ".github/workflows/resource-hunter-ci.yml"

env:
  RESOURCE_HUNTER_PROJECT_ROOT: ./skills/resource-hunter
  RESOURCE_HUNTER_PACKAGING_ARTIFACT_DIR: ./skills/resource-hunter/artifacts/packaging-baseline
  RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR: ./skills/resource-hunter/artifacts/downloaded-packaging-baseline
  RESOURCE_HUNTER_PACKAGING_ARTIFACT_PATTERN: resource-hunter-packaging-baseline-*
  RESOURCE_HUNTER_PACKAGING_EXPECTED_ARTIFACT_COUNT: "6"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e "./skills/resource-hunter[dev]"

      - name: Ruff
        run: ruff check ./skills/resource-hunter

      - name: Pytest
        run: pytest ./skills/resource-hunter/tests

      - name: Build
        run: python -m build ./skills/resource-hunter

      - name: Packaging baseline
        id: packaging_baseline
        continue-on-error: true
        run: >-
          python -m resource_hunter packaging-baseline
          --project-root "${{ env.RESOURCE_HUNTER_PROJECT_ROOT }}"
          --python auto
          --bootstrap-build-deps
          --output-dir "${{ env.RESOURCE_HUNTER_PACKAGING_ARTIFACT_DIR }}"
          --require-expected-outcomes

      - name: Upload packaging baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-hunter-packaging-baseline-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ${{ env.RESOURCE_HUNTER_PACKAGING_ARTIFACT_DIR }}
          if-no-files-found: ignore

  packaging-baseline-gate:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install "./skills/resource-hunter"

      - name: Download packaging baseline artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ env.RESOURCE_HUNTER_PACKAGING_ARTIFACT_PATTERN }}
          path: ${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}

      - name: Render downloaded packaging baseline report
        id: packaging_baseline_report
        continue-on-error: true
        shell: bash
        run: |
          set +e
          resource-hunter-packaging-baseline-report \
            --json \
            --require-contract-ok \
            "${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}" \
            > "${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}/packaging-baseline-report.json"
          status=$?
          cat "${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}/packaging-baseline-report.json"
          exit $status

      - name: Evaluate downloaded packaging baseline artifacts
        id: packaging_baseline_gate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          resource-hunter-packaging-baseline-gate \
            --json \
            --require-artifact-count "${{ env.RESOURCE_HUNTER_PACKAGING_EXPECTED_ARTIFACT_COUNT }}" \
            "${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}" \
            > "${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}/packaging-baseline-gate.json"
          status=$?
          cat "${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}/packaging-baseline-gate.json"
          exit $status

      - name: Upload packaging baseline report summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-hunter-packaging-baseline-report-summary
          path: ${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}/packaging-baseline-report.json
          if-no-files-found: ignore

      - name: Upload packaging baseline gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-hunter-packaging-baseline-gate-summary
          path: ${{ env.RESOURCE_HUNTER_DOWNLOADED_PACKAGING_ARTIFACT_DIR }}/packaging-baseline-gate.json
          if-no-files-found: ignore

      - name: Fail if packaging report or gate drifted
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.packaging_baseline_report.outcome }}" != "success" ]; then
            echo "::error::packaging-baseline-report detected drift or failed"
            exit 1
          fi
          if [ "${{ steps.packaging_baseline_gate.outcome }}" != "success" ]; then
            echo "::error::packaging-baseline-gate detected drift or failed"
            exit 1
          fi

